services:
  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    network_mode: host
    command:
      - redis-server
      - --bind
      - 127.0.0.1
      - --protected-mode
      - 'yes'
      - --appendonly
      - 'yes'
    volumes:
      - livekit-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-h', '127.0.0.1', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12
    security_opt:
      - no-new-privileges:true

  livekit:
    image: livekit/livekit-server:v1.13.4
    restart: unless-stopped
    network_mode: host
    command: ['--config', '/etc/livekit/livekit.yaml']
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
      - ./certs:/etc/livekit/certs:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stop_grace_period: 30s

volumes:
  livekit-redis: