<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All Welcome</title>
  <script>
	// Apply the saved/system theme before first paint to avoid a flash.
	(function () {
	  try {
		var t = localStorage.getItem('corro-theme');
		if (t !== 'dark' && t !== 'light') {
		  t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
		}
		document.documentElement.setAttribute('data-theme', t);
	  } catch (e) { /* ignore */ }
	})();
  </script>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/trade.css" />
  <link rel="stylesheet" href="css/turn-indicator.css" />
  <link rel="stylesheet" href="css/player-panel.css" />
  <link rel="stylesheet" href="css/connection-panel.css" />
  <link rel="stylesheet" href="css/dice.css" />
  <link rel="stylesheet" href="css/cards.css" />
	<link rel="stylesheet" href="css/card-art.css" />
	<link rel="stylesheet" href="css/visual-narrative.css" />
  <link rel="stylesheet" href="css/action-bar.css" />
  <link rel="stylesheet" href="css/end-screen.css" />
  <link rel="stylesheet" href="css/race-board.css" />
  <link rel="stylesheet" href="css/track-board.css" />
  <link rel="stylesheet" href="css/journey-board.css" />
  <link rel="stylesheet" href="css/assembly-board.css" />
  <link rel="stylesheet" href="css/draft-board.css" />
  <link rel="stylesheet" href="css/shedding-board.css" />
  <link rel="stylesheet" href="css/exploding-board.css" />
  <link rel="stylesheet" href="css/trivia-board.css" />
</head>
<body>
  <div class="app-main">
	<header class="app-header">
	  <h1 class="app-title" data-site-title>All Welcome</h1>
	  <div class="app-header__controls" id="app-controls"></div>
	</header>
	<main>
	<p id="game-surface-intro" class="app-intro" data-i18n="game.surface_intro.loading" data-i18n-defer hidden>Focus will move automatically to the game's main area when loading finishes. Press Control plus F1 to view the shortcuts.</p>

	<div class="game-layout">
	  <div class="game-layout__board">
		<div class="board-frame">
		  <!-- The turn indicator is inserted dynamically above the board. -->
		  <div id="board" role="application" tabindex="0" aria-label="Board" data-i18n-attr:aria-label="game.panels.board">
			<!-- Squares are rendered by the application. -->
		  </div>
		</div>
	  </div>

	  <div id="players-panel-mount"></div>

	  <div id="connection-panel-mount"></div>
	</div>

	<!-- DialogManager creates dialogs dynamically. -->

	<!-- Live region for accessibility announcements. -->
	<div id="sr-live" aria-live="polite" aria-atomic="true"></div>
	</main>
  </div>

	<!-- Dependencies -->
  <script src="libs/i18next.min.js"></script>
  <script src="libs/signalr.min.js"></script>

	<!-- Scripts load from relative paths inside dist. -->
  <script type="module" src="app.js"></script>

	<footer class="app-footer">
		<p class="app-footer__brand">
			<span data-i18n="footer.poweredBy">Powered by</span>
			<a class="app-footer__external-link" href="https://github.com/kastwey/corro" target="_blank"
				rel="noopener noreferrer" data-footer-link="corro"
				aria-label="Corro on GitHub, opens in a new window"
				data-i18n-attr:aria-label="footer.corroNewWindowLabel">
				<strong>Corro</strong>
				<svg class="app-footer__external-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
					<path d="M14 5h5v5" />
					<path d="M10 14 19 5" />
					<path d="M19 14v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4" />
				</svg>
			</a>.
		</p>
		<ul class="app-footer__links">
			<li>
				<a class="app-footer__external-link" href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank"
					rel="license noopener noreferrer" data-footer-link="license"
					aria-label="AGPL-3.0 license, opens in a new window"
					data-i18n-attr:aria-label="footer.licenseNewWindowLabel">
					<span>AGPL-3.0</span>
					<svg class="app-footer__external-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
						<path d="M14 5h5v5" />
						<path d="M10 14 19 5" />
						<path d="M19 14v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4" />
					</svg>
				</a>
			</li>
		</ul>
	</footer>
</body>
</html>
